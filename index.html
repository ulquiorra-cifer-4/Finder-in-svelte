<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>macOS Finder — VFS Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, "SF Pro Text", sans-serif;
    }

    /* Simulate a macOS window frame around the Finder */
    #app-shell {
      width: 960px;
      height: 600px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.08),
        0 30px 80px rgba(0,0,0,0.7),
        0 10px 30px rgba(0,0,0,0.5);
      position: relative;
    }

    /* Fake traffic light buttons */
    #app-shell::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 18px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #ff5f57;
      box-shadow: 20px 0 0 #febc2e, 40px 0 0 #28c840;
      z-index: 10;
      pointer-events: none;
    }

    #app { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="app-shell">
    <div id="app"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
